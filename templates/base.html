<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   
    <style>
    :root {
        --glass-bg: rgba(255, 255, 255, 0.7);
        --glass-border: rgba(255, 255, 255, 0.3);
        --accent: #6366f1;
    }

    body {
        margin: 0;
        background: #0f172a; /* Bleu nuit très sombre */
        font-family: 'Plus Jakarta Sans', sans-serif;
        color: #f8fafc;
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* Arrière-plan animé avec vagues et particules */
    .bg-animation {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(45deg, #0f172a, #1e1b4b, #312e81);
        z-index: -2;
    }

    .ocean { 
        height: 15%; width: 100%; position: absolute; bottom: 0; left: 0; background: transparent;
    }

    .wave {
        background: url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/85486/wave.svg') repeat-x; 
        position: absolute; top: -198px; width: 6400px; height: 198px; animation: wave 12s cubic-bezier( 0.36, 0.45, 0.63, 0.53) infinite; transform: translate3d(0, 0, 0);
    }

    .wave:nth-of-type(2) {
        top: -175px; animation: wave 12s cubic-bezier( 0.36, 0.45, 0.63, 0.53) -.125s infinite, swell 12s ease -1.25s infinite; opacity: 1;
    }

    @keyframes wave {
        0% { margin-left: 0; }
        100% { margin-left: -1600px; }
    }

    @keyframes swell {
        0%, 100% { transform: translate3d(0,-25px,0); }
        50% { transform: translate3d(0,5px,0); }
    }

    @keyframes pulse-blue {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); }
    70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
}

.btn-primary {
    animation: pulse-blue 2s infinite;
}

    /* Navbar Flottante */
    .navbar {
        background: var(--glass-bg) !important;
        backdrop-filter: blur(15px);
        margin: 20px;
        border-radius: 20px;
        border: 1px solid var(--glass-border);
    }

    .navbar-brand { font-weight: 800; letter-spacing: 1px; color: #6366f1 !important; }
    .nav-link { color: #1e293b !important; }

    /* Cartes Glassmorphism */
    .card {
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        color: #1e293b;
    }

    /* Tableau Stylisé */
    .table { color: #1e293b; }
    thead th {
        background: linear-gradient(90deg, #6366f1, #a855f7) !important;
        color: white !important;
        border: none !important;
        padding: 15px !important;
    }

    /* Boutons Neon */
    .btn-primary {
        background: linear-gradient(90deg, #6366f1, #a855f7);
        border: none;
        box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        transition: 0.3s;
    }

    .btn-primary:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
    }

    .stat-number {
    font-size: 3rem;
    font-weight: 800;
    background: linear-gradient(90deg, #6366f1, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.backdrop-blur {
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
}
</style>

</head>
<body>
    <body>
    <div class="bg-animation"></div>
    <div class="ocean">
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

   <nav class="navbar navbar-expand-lg mb-5">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">PRO-DATA</a>
        <div class="ms-auto d-flex align-items-center">
            <a href="/" class="nav-link px-3 me-2">Accueil (Doc)</a>
            <a href="/formulaire" class="nav-link px-3 me-2">📝 Formulaire</a>
            <a href="/admin" class="nav-link px-3 me-2">📁 Base</a>
            <a href="/analyse" class="btn btn-primary px-4 shadow-sm">📊 Analyse</a>
        </div>
    </div>
</nav>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} border-0 shadow-sm text-center">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        {% block content %}{% endblock %}
    </div>
</body>
</html>
